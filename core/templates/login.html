{% extends 'base.html' %}
{% block title %}Log In{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">Welcome Back</h2>
        
        <!-- Success Message -->
        <div id="success-message" class="hidden mb-4 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg">
            <p class="font-medium">Login successful! Redirecting...</p>
        </div>
        
        <!-- Error Message -->
        <div id="error-message" class="hidden mb-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg">
            <p class="font-medium" id="error-text"></p>
        </div>
        
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition"
                    placeholder="johndoe">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition"
                    placeholder="••••••••">
            </div>
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-gray-600">
                    <input type="checkbox" id="remember" class="mr-2 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                    Remember me
                </label>
                <a href="#" class="text-indigo-600 hover:underline">Forgot password?</a>
            </div>
            <button type="submit" id="submit-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition duration-200 shadow-md">
                Log In
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-6">
            Don't have an account? <a href="{% url 'signup' %}" class="text-indigo-600 hover:underline font-medium">Sign up</a>
        </p>
    </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submit-btn');
    const errorMessage = document.getElementById('error-message');
    const successMessage = document.getElementById('success-message');
    const errorText = document.getElementById('error-text');
    
    // Hide messages
    errorMessage.classList.add('hidden');
    successMessage.classList.add('hidden');
    
    // Disable button and show loading
    submitBtn.disabled = true;
    submitBtn.textContent = 'Logging In...';
    
    const formData = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
    };
    
    try {
        const response = await fetch('/api/users/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (response.ok) {
            // Store token in localStorage
            localStorage.setItem('authToken', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            
            // Show success message
            successMessage.classList.remove('hidden');
            
            // Redirect based on role
            const role = data.user.role;
            setTimeout(() => {
                if (role) {
                    window.location.href = `/dashboard/${role}/`;
                } else {
                    window.location.href = '/';
                }
            }, 1000);
        } else {
            // Show error messages
            let errorMsg = '';
            if (data.non_field_errors) {
                errorMsg = data.non_field_errors.join(', ');
            } else {
                for (const [field, errors] of Object.entries(data)) {
                    if (Array.isArray(errors)) {
                        errorMsg += `${errors.join(', ')}\n`;
                    } else {
                        errorMsg += `${errors}\n`;
                    }
                }
            }
            errorText.textContent = errorMsg || 'Invalid username or password.';
            errorMessage.classList.remove('hidden');
            
            // Re-enable button
            submitBtn.disabled = false;
            submitBtn.textContent = 'Log In';
        }
    } catch (error) {
        errorText.textContent = 'Network error. Please check your connection and try again.';
        errorMessage.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
    }
});
</script>
{% endblock %}
