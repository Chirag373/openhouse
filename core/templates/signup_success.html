{% extends 'base.html' %}
{% block title %}Finishing Signup{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg border border-gray-100 text-center">
        <div class="w-16 h-16 mx-auto rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center mb-4">
            <svg class="w-8 h-8 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
            </svg>
        </div>
        <h2 class="text-3xl font-bold text-gray-900">Finishing your account</h2>
        <p class="text-gray-500 mt-3">We are confirming your payment and preparing your dashboard.</p>
        <div id="status-message" class="mt-6 text-sm text-gray-600">Please wait a moment...</div>
        <div id="error-message" class="hidden mt-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-left"></div>
    </div>
</div>

<script>
const sessionId = "{{ session_id|escapejs }}";
const pendingSignupId = "{{ pending_signup_id|escapejs }}";
const statusMessage = document.getElementById('status-message');
const errorMessage = document.getElementById('error-message');
let attempts = 0;

async function checkStatus() {
    attempts += 1;
    try {
        const params = new URLSearchParams();
        if (sessionId) params.set('session_id', sessionId);
        if (pendingSignupId) params.set('pending_signup', pendingSignupId);
        const response = await fetch(`/api/signup/checkout-status/?${params.toString()}`);
        const data = await response.json();

        if (response.ok && data.status === 'completed') {
            localStorage.setItem('authToken', data.token);
            localStorage.setItem('auth_token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            sessionStorage.removeItem('signupDraft');
            window.location.href = data.redirect_url;
            return;
        }

        if (data.status === 'failed' || data.status === 'expired') {
            throw new Error(data.error || 'Your payment could not be completed. Please try signing up again.');
        }

        if (attempts < 10) {
            statusMessage.textContent = 'Payment confirmed. Finalizing your account...';
            setTimeout(checkStatus, 1500);
            return;
        }

        throw new Error('Payment was received, but account setup is taking longer than expected. Please try logging in shortly.');
    } catch (error) {
        statusMessage.classList.add('hidden');
        errorMessage.textContent = error.message;
        errorMessage.classList.remove('hidden');
    }
}

checkStatus();
</script>
{% endblock %}
