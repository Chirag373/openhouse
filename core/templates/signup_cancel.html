{% extends 'base.html' %}
{% block title %}Checkout Cancelled{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg border border-gray-100 text-center">
        <div class="w-16 h-16 mx-auto rounded-full bg-amber-50 text-amber-600 flex items-center justify-center mb-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M5.07 19h13.86c1.54 0 2.5-1.67 1.73-3L13.73 4c-.77-1.33-2.69-1.33-3.46 0L3.34 16c-.77 1.33.19 3 1.73 3z"></path>
            </svg>
        </div>
        <h2 class="text-3xl font-bold text-gray-900">Checkout cancelled</h2>
        <p class="text-gray-500 mt-3">No account was created and no plan was activated. You can return to signup and continue from there.</p>
        <div class="mt-8">
            <a href="/signup/?checkout=cancelled"
                class="inline-flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-200 shadow-md">
                Back to Sign Up
            </a>
        </div>
    </div>
</div>
{% endblock %}
