<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broker Dashboard | Open House</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-link.active {
            background-color: #f1f5f9;
            /* slate-100 */
            color: #0f172a;
            /* slate-900 */
            border-right: 4px solid #0f172a;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
</head>

<body class="bg-gray-100 font-sans text-gray-900 h-screen flex overflow-hidden">

    <!-- Mobile Header -->
    <div
        class="md:hidden fixed top-0 w-full bg-white z-50 border-b px-4 py-3 flex justify-between items-center shadow-sm">
        <span class="font-bold text-lg text-slate-900">Broker Dashboard</span>
        <button id="mobile-menu-btn" onclick="toggleSidebar()" class="p-2 text-gray-600 rounded-lg hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
            </svg>
        </button>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar"
        class="bg-white w-64 flex-shrink-0 border-r border-gray-200 hidden md:flex flex-col fixed md:relative h-full z-40 pt-16 md:pt-0 transition-transform transform -translate-x-full md:translate-x-0">
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <h1 class="text-xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
                <span
                    class="bg-slate-800 text-white w-8 h-8 rounded-lg flex items-center justify-center text-sm">BR</span>
                Dashboard
            </h1>
        </div>

        <div class="p-6 pb-2">
            <div class="flex items-center gap-3 mb-6">
                <div
                    class="w-10 h-10 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center font-bold text-lg border border-slate-200">
                    AC
                </div>
                <div>
                    <p class="font-semibold text-sm text-gray-900">Apex Capital</p>
                    <p class="text-xs text-gray-500">Real Estate Brokerage</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto no-scrollbar py-2">
            <ul class="space-y-1">
                <li><button onclick="switchTab('profile')" id="nav-profile"
                        class="sidebar-link w-full text-left px-6 py-3 text-sm font-medium text-gray-600 hover:bg-slate-50 hover:text-slate-900 transition-colors flex items-center gap-3 active">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                            </path>
                        </svg>
                        Profile
                    </button></li>
                <li><button onclick="switchTab('media')" id="nav-media"
                        class="sidebar-link w-full text-left px-6 py-3 text-sm font-medium text-gray-600 hover:bg-slate-50 hover:text-slate-900 transition-colors flex items-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                            </path>
                        </svg>
                        Media
                    </button></li>
                <li><button onclick="switchTab('settings')" id="nav-settings"
                        class="sidebar-link w-full text-left px-6 py-3 text-sm font-medium text-gray-600 hover:bg-slate-50 hover:text-slate-900 transition-colors flex items-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        Settings
                    </button></li>
            </ul>
        </nav>

        <div class="p-4 border-t border-gray-100">
            <a href="/"
                class="flex items-center gap-2 text-sm text-gray-500 hover:text-red-600 transition hover:bg-red-50 p-2 rounded-lg">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1">
                    </path>
                </svg>
                Sign Out
            </a>
        </div>
    </aside>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto h-full pt-16 md:pt-0 bg-gray-50" id="main-content">
        <div class="max-w-7xl mx-auto p-4 md:p-8">

            <!-- --- PROFILE SECTION --- -->
            <div id="section-profile" class="dashboard-section space-y-6">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-2xl font-bold text-gray-900">Brand Profile</h2>
                    <button
                        class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-900 shadow-sm">Save
                        Changes</button>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-6 md:p-8 space-y-8">
                        <!-- Company Info -->
                        <div>
                            <h3 class="text-lg font-semibold text-gray-800 mb-4 pb-2 border-b border-gray-100">Company
                                Information</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="md:col-span-2">
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
                                    <input type="text"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-200 focus:border-slate-500 outline-none transition"
                                        value="Apex Capital Real Estate">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Contact First
                                        Name</label>
                                    <input type="text"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-200 focus:border-slate-500 outline-none transition"
                                        value="Robert">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Contact Last
                                        Name</label>
                                    <input type="text"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-200 focus:border-slate-500 outline-none transition"
                                        value="Sterling">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Email <span
                                            class="text-xs text-gray-400">(Read Only)</span></label>
                                    <input type="email"
                                        class="w-full px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500 cursor-not-allowed"
                                        value="info@apexcapital.com" readonly>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Business Website</label>
                                    <input type="url"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-200 focus:border-slate-500 outline-none transition"
                                        placeholder="https://">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Company Address</label>
                                    <div class="flex items-center gap-4 mb-2">
                                        <label class="inline-flex items-center cursor-pointer">
                                            <input type="radio" name="addressType"
                                                class="text-slate-800 focus:ring-slate-500" checked>
                                            <span class="ml-2 text-sm text-gray-700">Actual Address</span>
                                        </label>
                                        <label class="inline-flex items-center cursor-pointer">
                                            <input type="radio" name="addressType"
                                                class="text-slate-800 focus:ring-slate-500">
                                            <span class="ml-2 text-sm text-gray-700">PO Box</span>
                                        </label>
                                    </div>
                                    <input type="text"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-200 focus:border-slate-500 outline-none transition"
                                        placeholder="100 Financial District Blvd, NY">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number 1</label>
                                    <input type="tel"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-200 focus:border-slate-500 outline-none transition"
                                        placeholder="(555) 000-0000">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number 2 <span
                                            class="text-gray-400 font-normal">(Optional)</span></label>
                                    <input type="tel"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-200 focus:border-slate-500 outline-none transition">
                                </div>
                            </div>
                        </div>

                        <!-- Licensing & Service Area -->
                        <div>
                            <h3 class="text-lg font-semibold text-gray-800 mb-4 pb-2 border-b border-gray-100">Licensing
                                & Operations</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">License Number</label>
                                    <input type="text"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-200 focus:border-slate-500 outline-none transition"
                                        placeholder="BK-987654321">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Serving Cities <span
                                            class="text-xs text-gray-400">(Comma separated)</span></label>
                                    <input type="text"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-200 focus:border-slate-500 outline-none transition"
                                        placeholder="New York, Boston, Miami">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Serving License States
                                        <span class="text-xs text-gray-400">(2-letter codes)</span></label>
                                    <input type="text"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-200 focus:border-slate-500 outline-none transition"
                                        placeholder="NY, MA, FL">
                                    <div class="flex gap-4 mt-2">
                                        <label class="inline-flex items-center cursor-pointer">
                                            <input type="checkbox" class="rounded text-slate-800 focus:ring-slate-500">
                                            <span class="ml-2 text-sm text-gray-700">International</span>
                                        </label>
                                        <label class="inline-flex items-center cursor-pointer">
                                            <input type="checkbox" class="rounded text-slate-800 focus:ring-slate-500">
                                            <span class="ml-2 text-sm text-gray-700">Nationwide</span>
                                        </label>
                                    </div>
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Business
                                        Description</label>
                                    <textarea rows="5"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-200 focus:border-slate-500 outline-none transition"
                                        placeholder="Describe your brokerage firm..."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- --- MEDIA SECTION --- -->
            <div id="section-media" class="dashboard-section hidden space-y-6">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-2xl font-bold text-gray-900">Brand Gallery</h2>
                    <span class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">0 / 10 Uploaded</span>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8">
                    <div
                        class="border-2 border-dashed border-gray-300 rounded-xl h-48 flex flex-col items-center justify-center text-gray-400 hover:bg-gray-50 cursor-pointer transition mb-8">
                        <svg class="w-12 h-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                            </path>
                        </svg>
                        <span class="text-base font-medium text-gray-600">Drag & Drop or Click to Upload</span>
                        <span class="text-sm">Up to 10 images supported</span>
                        <input type="file" class="hidden" multiple>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <!-- Placeholder for uploaded images -->
                        <div
                            class="aspect-video bg-gray-100 rounded-lg flex items-center justify-center border border-gray-200 text-gray-400 text-sm">
                            No images yet
                        </div>
                    </div>
                </div>
            </div>

            <!-- --- SETTINGS SECTION --- -->
            <div id="section-settings" class="dashboard-section hidden space-y-6">
                <h2 class="text-2xl font-bold text-gray-900 mb-6">Account Settings</h2>

                <div
                    class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden divide-y divide-gray-100">
                    <div class="p-6 md:p-8">
                        <h3 class="font-semibold text-gray-900 mb-4">Security</h3>
                        <div class="max-w-md space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                                <input type="password" class="w-full px-3 py-2 border rounded-md">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                                <input type="password" class="w-full px-3 py-2 border rounded-md">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                                <input type="password" class="w-full px-3 py-2 border rounded-md">
                            </div>
                            <button
                                class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-black transition">Update
                                Password</button>
                        </div>
                    </div>

                    <div class="p-6 md:p-8">
                        <h3 class="font-semibold text-gray-900 mb-4">Notifications</h3>
                        <div class="space-y-3">
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="checkbox" checked class="rounded text-slate-800 focus:ring-slate-600">
                                <span class="text-sm text-gray-700">Email me about account updates</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        function switchTab(tabId) {
            // Hide all sections
            document.querySelectorAll('.dashboard-section').forEach(el => el.classList.add('hidden'));
            // Show target section
            document.getElementById('section-' + tabId).classList.remove('hidden');

            // Update active nav state
            document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + tabId).classList.add('active');

            // On mobile, auto-close sidebar
            if (window.innerWidth < 768) {
                toggleSidebar();
            }
        }
    </script>
</body>

</html>
